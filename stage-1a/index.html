<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 1A - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card" id="task-card" class="todo-card priority-high">
        
        <div id="view-mode">
            <div class="header-row">
                <div class="title-group">
                    <input type="checkbox" id="check-done" data-testid="test-todo-complete-toggle" style="width: 22px; height: 22px; cursor: pointer;">
                    <h2 id="view-title" data-testid="test-todo-title" style="margin: 0;">Final Year Exams Prep</h2>
                </div>
                <div class="priority-indicator">
                    <div data-testid="test-todo-priority-indicator" id="view-indicator-dot" class="status-dot" style="background: var(--color-high);"></div>
                    <span data-testid="test-todo-priority" id="view-priority-text">High</span>
                </div>
            </div>

            <button id="btn-toggle-desc" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="section-desc" class="expand-toggle">Show Details</button>
            <div id="section-desc" data-testid="test-todo-collapsible-section" class="display-none description-box">
                <p id="view-desc-text" data-testid="test-todo-description">Review Obstetrics and Gynecology modules.</p>
            </div>

            <div class="meta-grid">
                <div>
                    <label class="label-text">Process Status</label>
                    <select id="select-status" data-testid="test-todo-status-control" class="input-style" style="padding: 5px;">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                    <strong id="display-status-label" data-testid="test-todo-status" style="display: block; margin-top: 8px; font-size: 13px;">In Progress</strong>
                </div>
                <div>
                    <label class="label-text">Final Deadline</label>
                    <time id="display-date-val" data-testid="test-todo-due-date" style="font-weight: 700; font-size: 14px;">2026-04-18</time>
                </div>
            </div>

            <div class="timer-container">
                <span id="label-time-left" data-testid="test-todo-time-remaining" aria-live="polite" class="time-text">Checking clock...</span>
                <div id="box-overdue" data-testid="test-todo-overdue-indicator" class="display-none">
                    <span class="overdue-badge">⚠️ TASK OVERDUE</span>
                </div>
            </div>

            <div class="action-row">
                <button id="btn-trigger-edit" data-testid="test-todo-edit-button" class="btn">Edit Task</button>
                <button data-testid="test-todo-delete-button" class="btn btn-delete">Remove</button>
            </div>
        </div>

        <form id="form-editor" data-testid="test-todo-edit-form" class="display-none">
            <h3 style="margin-top: 0; font-size: 18px;">Modify Task</h3>
            <div class="form-field">
                <label for="f-title" class="label-text">Title</label>
                <input type="text" id="f-title" data-testid="test-todo-edit-title-input" class="input-style" required>
            </div>
            <div class="form-field">
                <label for="f-desc" class="label-text">Description</label>
                <textarea id="f-desc" data-testid="test-todo-edit-description-input" class="input-style" rows="3"></textarea>
            </div>
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="f-priority" class="label-text">Priority Level</label>
                    <select id="f-priority" data-testid="test-todo-edit-priority-select" class="input-style">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label for="f-date" class="label-text">Set Deadline</label>
                    <input type="datetime-local" id="f-date" data-testid="test-todo-edit-due-date-input" class="input-style">
                </div>
            </div>
            <div class="action-row">
                <button type="submit" data-testid="test-todo-save-button" class="btn btn-primary">Apply Changes</button>
                <button type="button" id="btn-cancel-edit" data-testid="test-todo-cancel-button" class="btn">Discard</button>
            </div>
        </form>
    </article>
   <script src="script.js"></script>
</body>
</html>
